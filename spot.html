<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Spot – Hunting Party</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0f;
      --card: rgba(18, 18, 22, 0.82);
      --border: rgba(255, 255, 255, 0.10);
      --accent: #ff6188;
      --accent2: #fc9867;
      --text: #f2f2f7;
      --muted: #8e8e93;
    }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(13, 13, 15, 0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .header-back:hover { opacity: 0.7; }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* spacer to keep title centered */
    .header-spacer { width: 60px; }

    /* ── Page wrapper ────────────────────────── */
    main {
      max-width: 540px;
      margin: 0 auto;
      padding: 28px 20px env(safe-area-inset-bottom, 28px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Hero label ──────────────────────────── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Photo cards ─────────────────────────── */
    .photos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .photo-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: #1c1c1e;
      border: 1px solid var(--border);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      cursor: zoom-in;
    }

    /* First image spans full width */
    .photo-card.wide {
      grid-column: 1 / -1;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .photo-card:hover img { transform: scale(1.03); }

    .photo-card.tall { height: 260px; }
    .photo-card.short { height: 190px; }

    /* ── Glass card ──────────────────────────── */
    .glass-card {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Coords row ──────────────────────────── */
    .coords-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coords-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(255, 97, 136, 0.35);
    }

    .coords-text {
      flex: 1;
    }

    .coords-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .coords-value {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      font-variant-numeric: tabular-nums;
    }

    .copy-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      padding: 7px 14px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
      font-family: inherit;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.16); }
    .copy-btn.copied { color: #32d74b; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* ── Info rows ───────────────────────────── */
    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }

    .info-icon {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.07);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-content {
      flex: 1;
    }

    .info-key {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }

    .info-val {
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 1px;
    }

    /* ── Map buttons ─────────────────────────── */
    .map-buttons {
      display: flex;
      gap: 12px;
    }

    .map-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1c1c1e;
      color: var(--text);
      padding: 14px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      border: 1px solid var(--border);
      transition: background 0.18s, transform 0.15s;
    }
    .map-btn:hover {
      background: #2c2c2e;
      transform: translateY(-1px);
    }
    .map-btn:active { transform: translateY(0); }

    /* ── RSVP banner ─────────────────────────── */
    .rsvp-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: linear-gradient(135deg, rgba(255,97,136,0.18), rgba(252,152,103,0.14));
      border: 1px solid rgba(255, 97, 136, 0.25);
      border-radius: 20px;
      padding: 16px 20px;
    }

    .rsvp-text h3 {
      font-size: 1rem;
      font-weight: 700;
    }
    .rsvp-text p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .rsvp-link {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 10px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      box-shadow: 0 3px 12px rgba(255, 97, 136, 0.35);
      white-space: nowrap;
      transition: opacity 0.18s, transform 0.15s;
    }
    .rsvp-link:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── Lightbox ────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 94vw;
      max-height: 90dvh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      object-fit: contain;
    }
    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="header-back" href="index.html" id="back-btn">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 1L1 7l6 6"/>
      </svg>
      Back
    </a>
    <span class="header-title">The Spot</span>
    <div class="header-spacer"></div>
  </header>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
    <button id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="Expanded view" />
  </div>

  <main>

    <!-- Photos -->
    <section aria-label="Spot photos">
      <p class="section-label">Photos</p>
      <div class="photos-grid">
        <!-- Full-width primary image -->
        <div class="photo-card wide tall" id="card-img1" role="button" tabindex="0" aria-label="Open image 1">
          <img src="image.png" alt="The Spot – view 1" loading="eager" />
        </div>
        <!-- Second image -->
        <div class="photo-card short" id="card-img2" role="button" tabindex="0" aria-label="Open image 2"
             style="grid-column: 1 / -1;">
          <img src="image2.png" alt="The Spot – view 2" loading="lazy" />
        </div>
      </div>
    </section>

    <!-- Coordinates & Info -->
    <section aria-label="Location info">
      <div class="glass-card">

        <!-- Coordinates -->
        <div class="coords-block">
          <div class="coords-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="coords-text">
            <div class="coords-label">Coordinates</div>
            <div class="coords-value" id="coords-display">35.32112° N, 80.72996° W</div>
          </div>
          <button class="copy-btn" id="copy-coords" aria-label="Copy coordinates">Copy</button>
        </div>

        <div class="divider"></div>

        <!-- Info rows -->
        <div class="info-row">
          <div class="info-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Date &amp; Time</div>
            <div class="info-val">April 24, 2026 — 10 PM</div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="info-row">
          <div class="info-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Location</div>
            <div class="info-val">35°19'16"N 80°43'47"W</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Map buttons -->
        <div class="map-buttons">
          <!-- Apple Maps -->
          <a class="map-btn" href="https://maps.apple/p/wW0kJGs11ow3nm" target="_blank" rel="noopener noreferrer" id="apple-maps-btn">
            <svg width="16" height="16" viewBox="0 0 384 512" fill="currentColor">
              <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.1-44.6-35.9-2.8-74.3 22.7-93.1 22.7-18.9 0-49.5-22.1-78.6-21.5-44.3 .7-84.8 25.8-107.6 66.1-46.8 82.5-12.2 205.1 33.1 270.8 22.1 32 49.3 67.2 84.7 66.2 33.6-1.1 46.1-21.4 86.8-21.4 40.5 0 52.4 21.4 87.2 20.8 35.5-.6 59.8-32.9 81.3-64.6 24.8-36.5 35-71.9 35.5-73.8-1.1-.3-81.1-30.8-82.6-103.8zM257.6 94.6c20.3-24.7 34.6-59.3 30.9-94.6-28.8 1.2-64.8 19.3-85.9 44.1-16.7 19.4-33.8 54.4-29.3 89.1 32.5 2.5 65.6-14 84.3-38.6z"/>
            </svg>
            Apple Maps
          </a>
          <!-- Google Maps -->
          <a class="map-btn" href="https://maps.app.goo.gl/k6wt714py9BvRVhr9" target="_blank" rel="noopener noreferrer" id="google-maps-btn">
            <svg width="16" height="16" viewBox="0 0 488 512" fill="currentColor">
              <path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/>
            </svg>
            Google Maps
          </a>
        </div>

      </div>
    </section>

    <!-- RSVP Banner -->
    <section aria-label="RSVP">
      <div class="rsvp-banner">
        <div class="rsvp-text">
          <h3>You coming?</h3>
          <p>Lock in your spot on Partiful</p>
        </div>
        <a class="rsvp-link" href="https://partiful.com/e/aX7b9vls5ZJHSMLjoJQk" target="_blank" rel="noopener noreferrer" id="rsvp-btn">RSVP</a>
      </div>
    </section>

  </main>

  <script>
    // ── Lightbox ──────────────────────────────────────────────
    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn    = document.getElementById('lightbox-close');

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('card-img1').addEventListener('click', () =>
      openLightbox('image.png', 'The Spot – view 1'));
    document.getElementById('card-img2').addEventListener('click', () =>
      openLightbox('image2.png', 'The Spot – view 2'));

    // keyboard
    ['card-img1','card-img2'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') e.currentTarget.click();
      });
    });

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    closeBtn.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── Copy Coordinates ──────────────────────────────────────
    document.getElementById('copy-coords').addEventListener('click', function () {
      const coords = '35.32112, -80.72996';
      navigator.clipboard.writeText(coords).then(() => {
        this.textContent = 'Copied!';
        this.classList.add('copied');
        setTimeout(() => {
          this.textContent = 'Copy';
          this.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = coords;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    });
  </script>
</body>
</html>
