<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Thank You – Hunting Party</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: #0d0d0f;
      color: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      text-align: center;
      padding: 40px 28px;
      max-width: 400px;
    }

    .heart {
      font-size: 3rem;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    p {
      font-size: 1rem;
      color: #8e8e93;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="heart">🤍</div>
    <h1>Thank you for a good time</h1>
    <p>It was a night to remember.</p>
  </div>
</body>

</html>
