<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hunting Party</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100dvh;
      background: #111;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      position: relative;
    }

    /* ── Map ── */
    #map-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }
    #map-container:active { cursor: grabbing; }
    #map-img {
      position: absolute;
      top: 50%; left: 50%;
      transform-origin: top left;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Glassmorphism card ── */
    .glass {
      background: rgba(20, 20, 20, 0.80);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Top countdown pill ── */
    #countdown-pill {
      position: absolute;
      top: max(env(safe-area-inset-top, 20px), 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      border-radius: 30px;
      padding: 10px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 220px;
      white-space: nowrap;
    }
    #countdown-label {
      font-size: 0.7rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    #countdown-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    /* ── Bottom panel ── */
    #bottom-panel {
      position: absolute;
      bottom: max(env(safe-area-inset-bottom, 20px), 20px);
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 400px;
      border-radius: 24px;
      padding: 18px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Coords + RSVP row ── */
    #top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    #coords {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      padding: 6px 12px;
      border-radius: 12px;
    }
    #coords svg { flex-shrink: 0; }

    #rsvp-btn {
      background: linear-gradient(135deg, #ff6188, #fc9867);
      color: #fff;
      padding: 8px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      box-shadow: 0 2px 10px rgba(255, 97, 136, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── Map buttons ── */
    #map-buttons {
      display: flex;
      gap: 12px;
    }
    .map-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #2c2c2e;
      color: #fff;
      padding: 14px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s;
    }
    .map-btn:hover { background: #3c3c3e; }
  </style>
</head>
<body>

  <!-- Map -->
  <div id="map-container">
    <img id="map-img" src="map.png" alt="Map" draggable="false" />
  </div>

  <!-- Countdown -->
  <div id="countdown-pill" class="glass">
    <div id="countdown-label">Countdown</div>
    <div id="countdown-value">--d --h --m --s</div>
  </div>

  <!-- Bottom panel -->
  <div id="bottom-panel" class="glass">
    <div id="top-row">
      <div id="coords">
        <!-- pin icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        35.32112° N, 80.72996° W
      </div>
      <a id="rsvp-btn" href="https://partiful.com/e/aX7b9vls5ZJHSMLjoJQk" target="_blank" rel="noopener noreferrer">RSVP</a>
    </div>

    <div id="map-buttons">
      <!-- Apple Maps -->
      <a class="map-btn" href="https://maps.apple/p/L32NJMgTrT1Cr-" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 384 512" fill="currentColor">
          <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.1-44.6-35.9-2.8-74.3 22.7-93.1 22.7-18.9 0-49.5-22.1-78.6-21.5-44.3 .7-84.8 25.8-107.6 66.1-46.8 82.5-12.2 205.1 33.1 270.8 22.1 32 49.3 67.2 84.7 66.2 33.6-1.1 46.1-21.4 86.8-21.4 40.5 0 52.4 21.4 87.2 20.8 35.5-.6 59.8-32.9 81.3-64.6 24.8-36.5 35-71.9 35.5-73.8-1.1-.3-81.1-30.8-82.6-103.8zM257.6 94.6c20.3-24.7 34.6-59.3 30.9-94.6-28.8 1.2-64.8 19.3-85.9 44.1-16.7 19.4-33.8 54.4-29.3 89.1 32.5 2.5 65.6-14 84.3-38.6z"/>
        </svg>
        Apple Maps
      </a>
      <!-- Google Maps -->
      <a class="map-btn" href="https://maps.app.goo.gl/k6wt714py9BvRVhr9" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 488 512" fill="currentColor">
          <path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/>
        </svg>
        Google Maps
      </a>
    </div>
  </div>

  <script>
    // ── Countdown ──────────────────────────────────────────
    const target = new Date('April 24, 2026 22:00:00 EST').getTime();
    const countdownEl = document.getElementById('countdown-value');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const dist = target - Date.now();
      if (dist <= 0) { countdownEl.textContent = 'IT IS TIME'; return; }
      const d = Math.floor(dist / 864e5);
      const h = Math.floor((dist % 864e5) / 36e5);
      const m = Math.floor((dist % 36e5) / 6e4);
      const s = Math.floor((dist % 6e4) / 1e3);
      countdownEl.textContent = `${d}d ${pad(h)}h ${pad(m)}m ${pad(s)}s`;
    }
    tick();
    setInterval(tick, 1000);

    // ── Pan & Zoom (no dependencies needed) ───────────────
    const container = document.getElementById('map-container');
    const img = document.getElementById('map-img');

    let scale = 1, tx = 0, ty = 0;
    let dragging = false, lastX = 0, lastY = 0;

    function applyTransform() {
      img.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${scale})`;
    }
    applyTransform();

    // Mouse drag
    container.addEventListener('mousedown', e => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx += e.clientX - lastX; ty += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      applyTransform();
    });
    window.addEventListener('mouseup', () => dragging = false);

    // Scroll zoom
    container.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(8, Math.max(0.5, scale * delta));
      applyTransform();
    }, { passive: false });

    // Touch (pinch & pan)
    let lastTouches = [];
    container.addEventListener('touchstart', e => {
      lastTouches = [...e.touches];
    }, { passive: true });

    container.addEventListener('touchmove', e => {
      e.preventDefault();
      const touches = [...e.touches];

      if (touches.length === 1 && lastTouches.length === 1) {
        tx += touches[0].clientX - lastTouches[0].clientX;
        ty += touches[0].clientY - lastTouches[0].clientY;
      }

      if (touches.length === 2 && lastTouches.length === 2) {
        const prevDist = Math.hypot(
          lastTouches[0].clientX - lastTouches[1].clientX,
          lastTouches[0].clientY - lastTouches[1].clientY
        );
        const newDist = Math.hypot(
          touches[0].clientX - touches[1].clientX,
          touches[0].clientY - touches[1].clientY
        );
        scale = Math.min(8, Math.max(0.5, scale * (newDist / prevDist)));
      }

      lastTouches = touches;
      applyTransform();
    }, { passive: false });

    container.addEventListener('touchend', e => {
      lastTouches = [...e.touches];
    }, { passive: true });
  </script>
</body>
</html>
